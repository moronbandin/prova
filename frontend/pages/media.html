<!doctype html>
<html lang="gl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="site-nav"></div>

  <header class="site-header">
    <div id="breadcrumbs"></div>
    <h1>Media</h1>
    <p class="muted">Ligazóns e recursos asociados a territorios, coplas e pezas.</p>
  </header>

  <main class="page-wrap">
    <section class="card">
      <label class="toolbar-label" for="search">Buscar media</label>
      <input id="search" type="search" placeholder="Título, provider, URL..." autocomplete="off">
    </section>

    <section class="card">
      <div class="section-head">
        <h2 class="section-title">Listado</h2>
        <p id="results-count" class="muted"></p>
      </div>
      <div id="media-list" class="linked-block"></div>
    </section>
  </main>

  <script type="module" src="../js/media.js"></script>
</body>
</html>
