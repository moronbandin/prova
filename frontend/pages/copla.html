<!doctype html>
<html lang="gl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copla</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="site-nav"></div>

  <header class="site-header">
    <div id="breadcrumbs"></div>
    <h1 id="title">Copla</h1>
    <p id="subtitle" class="muted"></p>
  </header>

  <main class="page-wrap">
    <section class="card">
      <div class="section-head">
        <h2 class="section-title">Texto</h2>
        <p id="copla-id" class="muted"></p>
      </div>
      <div id="text" class="copla-text copla-text-large"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Territorios</h2>
      <div id="territories" class="linked-block"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Etiquetas</h2>
      <div id="tags" class="tag-row"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Notas</h2>
      <div id="notes" class="notes-box"></div>
    </section>
  </main>

  <script type="module" src="../js/copla.js"></script>
</body>
</html>
