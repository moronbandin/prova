<!DOCTYPE html>
<html lang="gl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proba de capas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    body { display: grid; grid-template-columns: 320px 1fr; }
    aside {
      padding: 12px;
      border-right: 1px solid #ddd;
      overflow: auto;
      background: #f8f8f8;
    }
    #map { height: 100vh; width: 100%; }
    .row { margin-bottom: 12px; display: grid; gap: 6px; }
    label { font-size: 14px; font-weight: 600; }
    select, button {
      padding: 8px 10px;
      font-size: 14px;
    }
    .hint {
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
    .stats {
      margin-top: 12px;
      font-size: 13px;
      background: white;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <aside>
    <h2>Proba de capas</h2>

    <div class="row">
      <label for="layer-kind">Capa</label>
      <select id="layer-kind">
        <option value="provincias">Provincias</option>
        <option value="comarcas">Comarcas</option>
        <option value="concellos">Concellos</option>
        <option value="parroquias">Parroquias</option>
      </select>
    </div>

    <div class="row">
      <label for="layer-version">Versión</label>
      <select id="layer-version">
        <option value="original">Orixinal</option>
        <option value="web">Web</option>
      </select>
    </div>

    <div class="row">
      <button id="load-btn">Cargar capa</button>
      <button id="clear-btn">Limpar mapa</button>
    </div>

    <div class="hint">
      Proba diferentes capas e compara a versión orixinal coa versión web.
      Fai zoom e comproba bordos, formas pequenas e velocidade de carga.
    </div>

    <div class="stats" id="stats">Sen datos cargados.</div>
  </aside>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <script>
    const map = L.map("map").setView([42.8, -8.2], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    let currentLayer = null;

    const FILES = {
      provincias: {
        original: "assets/provincias.geojson",
        web: "assets/web/provincias.web.geojson",
        type: "geojson"
      },
      comarcas: {
        original: "assets/comarcas.geojson",
        web: "assets/web/comarcas.web.geojson",
        type: "geojson"
      },
      concellos: {
        original: "assets/concellos.geojson",
        web: "assets/web/concellos.web.geojson",
        type: "geojson"
      },
      parroquias: {
        original: "assets/parroquias.topo.json",
        web: "assets/web/parroquias.web.topo.json",
        type: "topojson"
      }
    };

    const statsEl = document.getElementById("stats");

    function clearMap() {
      if (currentLayer) {
        map.removeLayer(currentLayer);
        currentLayer = null;
      }
      statsEl.textContent = "Sen datos cargados.";
    }

    function featureLabel(kind, props = {}) {
      if (kind === "provincias") {
        return props.PROVINCIA || props.nome || "Provincia";
      }

      if (kind === "comarcas") {
        return props.COMARCA || props.nome || "Comarca";
      }

      if (kind === "concellos") {
        return props.NOMECONCEL || props.CONCELLO || props.nome || "Concello";
      }

      if (kind === "parroquias") {
        return props.PARROQUIA || props.nome || "Parroquia";
      }

      return props.nome || "Elemento";
    }

    async function loadLayer() {
      const kind = document.getElementById("layer-kind").value;
      const version = document.getElementById("layer-version").value;
      const cfg = FILES[kind];
      const url = cfg[version];

      clearMap();

      const started = performance.now();
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`Non se puido cargar ${url} (${res.status})`);
      }

      const data = await res.json();
      const fetchedAt = performance.now();

      let geojson;
      if (cfg.type === "topojson") {
        const objName = Object.keys(data.objects)[0];
        geojson = topojson.feature(data, data.objects[objName]);
      } else {
        geojson = data;
      }

      currentLayer = L.geoJSON(geojson, {
        style: {
          weight: 1,
          opacity: 1,
          fillOpacity: 0.1
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(featureLabel(kind, feature.properties));
        }
      }).addTo(map);

      const renderedAt = performance.now();

      try {
        map.fitBounds(currentLayer.getBounds(), { padding: [20, 20] });
      } catch {}

      const featureCount = Array.isArray(geojson.features) ? geojson.features.length : 0;
      const approxBytes = new Blob([JSON.stringify(data)]).size;

      statsEl.textContent =
`Capa: ${kind}
Versión: ${version}
URL: ${url}

Features: ${featureCount}
Tamaño aprox.: ${(approxBytes / 1024 / 1024).toFixed(2)} MB
Tempo fetch+parse: ${(fetchedAt - started).toFixed(0)} ms
Tempo render: ${(renderedAt - fetchedAt).toFixed(0)} ms
Tempo total: ${(renderedAt - started).toFixed(0)} ms`;
    }

    document.getElementById("load-btn").addEventListener("click", () => {
      loadLayer().catch(err => {
        console.error(err);
        statsEl.textContent = `Erro:\n${err.message}`;
      });
    });

    document.getElementById("clear-btn").addEventListener("click", clearMap);
  </script>
</body>
</html>
